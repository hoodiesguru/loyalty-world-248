            <h1>Contact Us</h1>
            <p>Have questions about our financial advisors services? Get in touch with our Miami office.</p>
            <p><strong>Phone:</strong> +1-305-555-0177<br><strong>Address:</strong> Miami, FL, 33130</p>
            <form action=/send-message method="POST">
                <input type="text" name="name" placeholder="{loc_data['contact_name_placeholder']}" required>
                <input type="email" name="email" placeholder="{loc_data['contact_email_placeholder']}" required>
                <textarea name="message" placeholder="{loc_data['contact_msg_placeholder']}" rows="5" required></textarea>
                <button type="submit">{loc_data['contact_submit']}</button>
            </form>
            <footer>
                <p>&copy; {time.strftime('%Y')} {biz_name}. {loc_data['rights_reserved']}</p>
            </footer>
        </div>
        
</body>
